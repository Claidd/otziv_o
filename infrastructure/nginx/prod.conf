upstream otziv_app {
    server app:8080;
}

upstream otziv_keycloak {
    server keycloak:8080;
}

upstream otziv_grafana {
    server grafana:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    server_name o-ogo.ru www.o-ogo.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://o-ogo.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.o-ogo.ru;
    server_tokens off;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers off;

    return 301 https://o-ogo.ru$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name o-ogo.ru;
    server_tokens off;
    charset utf-8;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25m;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Scheme https;
    proxy_set_header X-Forwarded-Ssl on;

    location = /actuator/health {
        proxy_pass http://otziv_app;
    }

    location /actuator/ {
        return 404;
    }

    location /api/ {
        proxy_pass http://otziv_app;
        proxy_read_timeout 10m;
    }

    location /images/ {
        proxy_pass http://otziv_app;
        proxy_read_timeout 120s;
    }

    location = /webhook {
        proxy_pass http://otziv_app;
        proxy_read_timeout 60s;
    }

    location /webhook/ {
        proxy_pass http://otziv_app;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass http://otziv_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Scheme https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
    }

    location = /legacy {
        return 301 /legacy/;
    }

    location /legacy/ {
        rewrite ^/legacy(/.*)$ $1 break;
        proxy_pass http://otziv_app;
        proxy_read_timeout 120s;
    }

    location = /keycloak {
        return 301 /keycloak/;
    }

    location /keycloak/ {
        proxy_pass http://otziv_keycloak/keycloak/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Scheme https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header X-Forwarded-Prefix /keycloak;
        proxy_set_header Forwarded "";
        proxy_read_timeout 120s;
    }

    location = /grafana {
        return 301 /grafana/;
    }

    location = /actuator/prometheus {
        deny all;
    }

    location /grafana/api/live/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Scheme https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://otziv_grafana;
    }

    location /grafana/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://otziv_grafana;
        proxy_read_timeout 120s;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* ^/(?:assets/.+\.(?:js|css|woff2?|ttf|otf|png|jpe?g|gif|webp|avif|svg|ico|webmanifest)|[^/]+\.(?:js|css|woff2?|ttf|otf|png|jpe?g|gif|webp|avif|svg|ico|webmanifest))$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
        expires 1y;
    }

    location = /index.html {
        root /usr/share/nginx/html;
        expires -1;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
