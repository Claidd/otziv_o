upstream otziv_app {
    server app:8080;
}

upstream otziv_keycloak {
    server keycloak:8080;
}

upstream otziv_grafana {
    server grafana:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    server_name localhost;
    server_tokens off;
    charset utf-8;

    client_max_body_size 25m;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 8088;

    location = /actuator/health {
        proxy_pass http://otziv_app;
    }

    location /actuator/ {
        return 404;
    }

    location /api/ {
        proxy_pass http://otziv_app;
        proxy_read_timeout 10m;
    }

    location /images/ {
        proxy_pass http://otziv_app;
        proxy_read_timeout 120s;
    }

    location = /webhook {
        proxy_pass http://otziv_app;
        proxy_read_timeout 60s;
    }

    location /webhook/ {
        proxy_pass http://otziv_app;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass http://otziv_app;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8088;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
    }

    location = /legacy {
        return 301 /legacy/;
    }

    location /legacy/ {
        rewrite ^/legacy(/.*)$ $1 break;
        proxy_pass http://otziv_app;
        proxy_read_timeout 120s;
    }

    location = /keycloak {
        return 301 /keycloak/;
    }

    location /keycloak/ {
        proxy_pass http://otziv_keycloak/keycloak/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8088;
        proxy_set_header X-Forwarded-Prefix /keycloak;
        proxy_read_timeout 120s;
    }

    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/api/live/ {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8088;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://otziv_grafana;
    }

    location /grafana/ {
        proxy_pass http://otziv_grafana;
        proxy_read_timeout 120s;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* ^/(?:assets/.+\.(?:js|css|woff2?|ttf|otf|png|jpe?g|gif|webp|avif|svg|ico|webmanifest)|[^/]+\.(?:js|css|woff2?|ttf|otf|png|jpe?g|gif|webp|avif|svg|ico|webmanifest))$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
        expires 1y;
    }

    location = /index.html {
        root /usr/share/nginx/html;
        expires -1;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
