# Глобальные интервалы. Указываем как часто опрашивать цели, сколько ждать ответ и как часто пересчитывать правила
global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

# Везде используется статик конфиг: targets - это имена сервисов в docker-сети.
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app:8080"]

  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["keycloak:9000"]

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]
