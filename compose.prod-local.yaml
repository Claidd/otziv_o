name: otziv-prod-local

networks:
  internal_net:
    driver: bridge

volumes:
  mysql_data:
    name: ${LOCAL_MYSQL_VOLUME:-otziv-prod-local_mysql_data}
  keycloak_pg_data:
  loki_data:
  alloy_data:
  grafana_data:
  prometheus_data:
  minio_data:
  sent_hashes:

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --restrict-fk-on-non-standard-key=OFF
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Irkutsk}
    ports:
      - "127.0.0.1:${LOCAL_MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/mysql_backup:/backup
      - ./data/bots:/var/lib/mysql-files
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - internal_net

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    profiles:
      - db-admin
    ports:
      - "127.0.0.1:${LOCAL_PHPMYADMIN_PORT:-6572}:80"
    environment:
      UPLOAD_LIMIT: 512M
      PMA_HOST: mysql
      PMA_ARBITRARY: "0"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal_net

  keycloak-postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      TZ: ${TZ:-Asia/Irkutsk}
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - internal_net

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    mem_limit: 1g
    command: start --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /keycloak
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_STRICT: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_PROXY_TRUSTED_ADDRESSES: ${KC_PROXY_TRUSTED_ADDRESSES:-172.16.0.0/12,127.0.0.0/8}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      OTZIV_APP_BASE_URL: ${OTZIV_APP_BASE_URL}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
    volumes:
      - ./infrastructure/keycloak/realm-config.prod.json:/opt/keycloak/data/import/otziv-realm.json:ro
      - ./infrastructure/keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -ec 'exec 3<>/dev/tcp/127.0.0.1/9000;
          printf "GET /keycloak/health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3;
          cat <&3 | grep -q UP'
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - internal_net

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-local}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-local-minio-secret}
    ports:
      - "127.0.0.1:9001:9000"
      - "127.0.0.1:9002:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - internal_net

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY"
        mc mb --ignore-existing "local/$$S3_BUCKET"
        mc anonymous set download "local/$$S3_BUCKET"
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-local}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-local-minio-secret}
      S3_BUCKET: ${S3_BUCKET:-local}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - internal_net

  app:
    image: ${APP_IMAGE:-otziv-app:prod-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: ${TZ:-Asia/Irkutsk}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx768m -XX:MaxRAMPercentage=75 -Djdk.http.auth.tunneling.disabledSchemes= -Djdk.http.auth.proxying.disabledSchemes=}
      DATABASE_URL: ${DATABASE_URL}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-otziv-backend}
      KEYCLOAK_ADMIN_SERVER_URL: ${KEYCLOAK_ADMIN_SERVER_URL}
      KEYCLOAK_ADMIN_REALM: ${KEYCLOAK_ADMIN_REALM:-otziv}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-otziv-backend}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-30m}
      OTZIV_LOG_PATH: ${OTZIV_LOG_PATH:-/app/logs}
      OTZIV_CABINET_CACHE_TTL: ${OTZIV_CABINET_CACHE_TTL:-PT3H}
      OTZIV_LEGACY_ENABLED: ${OTZIV_LEGACY_ENABLED:-false}
      OTZIV_TASK_SCHEDULING_POOL_SIZE: ${OTZIV_TASK_SCHEDULING_POOL_SIZE:-4}
      OTZIV_BOARD_LIVE_SLICE_RETENTION_DAYS: ${OTZIV_BOARD_LIVE_SLICE_RETENTION_DAYS:-90}
      OTZIV_ARCHIVE_ORDERS_RETENTION_DAYS: ${OTZIV_ARCHIVE_ORDERS_RETENTION_DAYS:-60}
      OTZIV_ARCHIVE_ORDERS_BATCH_SIZE: ${OTZIV_ARCHIVE_ORDERS_BATCH_SIZE:-500}
      OTZIV_ARCHIVE_ORDERS_MAX_BATCH_SIZE: ${OTZIV_ARCHIVE_ORDERS_MAX_BATCH_SIZE:-5000}
      OTZIV_ARCHIVE_ORDERS_APPLY_ENABLED: ${OTZIV_ARCHIVE_ORDERS_APPLY_ENABLED:-false}
      OTZIV_ARCHIVE_ORDERS_SCHEDULE_ENABLED: ${OTZIV_ARCHIVE_ORDERS_SCHEDULE_ENABLED:-false}
      OTZIV_ARCHIVE_ORDERS_SCHEDULE_CRON: "${OTZIV_ARCHIVE_ORDERS_SCHEDULE_CRON:-0 15 4 * * *}"
      OTZIV_ARCHIVE_ORDERS_SCHEDULE_ZONE: ${OTZIV_ARCHIVE_ORDERS_SCHEDULE_ZONE:-Asia/Irkutsk}
      OTZIV_ARCHIVE_ORDERS_SCHEDULE_CATCH_UP_WINDOW: ${OTZIV_ARCHIVE_ORDERS_SCHEDULE_CATCH_UP_WINDOW:-PT3H}
      OTZIV_ANALYTICS_AGGREGATES_READ_ENABLED: ${OTZIV_ANALYTICS_AGGREGATES_READ_ENABLED:-false}
      OTZIV_ANALYTICS_REBUILD_API_ENABLED: ${OTZIV_ANALYTICS_REBUILD_API_ENABLED:-false}
      OTZIV_ANALYTICS_REBUILD_STARTUP_ENABLED: ${OTZIV_ANALYTICS_REBUILD_STARTUP_ENABLED:-false}
      OTZIV_ANALYTICS_REBUILD_STARTUP_MONTH: ${OTZIV_ANALYTICS_REBUILD_STARTUP_MONTH:-}
      OTZIV_ANALYTICS_REBUILD_STARTUP_CLOSED: ${OTZIV_ANALYTICS_REBUILD_STARTUP_CLOSED:-false}
      OTZIV_ANALYTICS_REBUILD_SCHEDULE_ENABLED: ${OTZIV_ANALYTICS_REBUILD_SCHEDULE_ENABLED:-false}
      OTZIV_ANALYTICS_REBUILD_SCHEDULE_CRON: "${OTZIV_ANALYTICS_REBUILD_SCHEDULE_CRON:-0 30 3 * * *}"
      OTZIV_ANALYTICS_REBUILD_SCHEDULE_ZONE: ${OTZIV_ANALYTICS_REBUILD_SCHEDULE_ZONE:-Asia/Irkutsk}
      OTZIV_ANALYTICS_REBUILD_SCHEDULE_PREVIOUS_MONTH_WINDOW_DAYS: ${OTZIV_ANALYTICS_REBUILD_SCHEDULE_PREVIOUS_MONTH_WINDOW_DAYS:-7}
      OTZIV_ANALYTICS_REBUILD_SCHEDULE_VERIFY_ADMIN_MONTH: ${OTZIV_ANALYTICS_REBUILD_SCHEDULE_VERIFY_ADMIN_MONTH:-true}
      OTZIV_SLOW_SQL_MS: ${OTZIV_SLOW_SQL_MS:-250}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_STARTTLS_ENABLE: ${MAIL_STARTTLS_ENABLE:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN_LOCAL_DOCKER}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME_LOCAL_DOCKER}
      TELEGRAM_BOT_REGISTRATION_ENABLED: ${TELEGRAM_BOT_REGISTRATION_ENABLED:-true}
      TELEGRAM_PROXY_ENABLED: ${TELEGRAM_PROXY_ENABLED:-false}
      TELEGRAM_PROXY_HOST: ${TELEGRAM_PROXY_HOST:-}
      TELEGRAM_PROXY_PORT: ${TELEGRAM_PROXY_PORT:-8888}
      TELEGRAM_PROXY_TYPE: ${TELEGRAM_PROXY_TYPE:-HTTP}
      TELEGRAM_ADMIN_CHAT_IDS: ${TELEGRAM_ADMIN_CHAT_IDS:-794146111,828987226}
      WHATSAPP_PROXY_ENABLED: ${WHATSAPP_PROXY_ENABLED:-false}
      WHATSAPP_PROXY_HOST: ${WHATSAPP_PROXY_HOST:-}
      WHATSAPP_PROXY_PORT: ${WHATSAPP_PROXY_PORT:-8888}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:-}
      MAX_BOT_USERNAME: ${MAX_BOT_USERNAME:-}
      MAX_BOT_WEBHOOK_SECRET: ${MAX_BOT_WEBHOOK_SECRET:-}
      MAX_BOT_API_BASE_URL: ${MAX_BOT_API_BASE_URL:-https://platform-api.max.ru}
      MAX_BOT_LONG_POLLING_ENABLED: ${MAX_BOT_LONG_POLLING_ENABLED:-false}
      MAX_BOT_LONG_POLLING_FIXED_DELAY_MS: ${MAX_BOT_LONG_POLLING_FIXED_DELAY_MS:-30000}
      MAX_BOT_LONG_POLLING_TIMEOUT_SECONDS: ${MAX_BOT_LONG_POLLING_TIMEOUT_SECONDS:-25}
      MAX_PROXY_ENABLED: ${MAX_PROXY_ENABLED:-false}
      MAX_PROXY_HOST: ${MAX_PROXY_HOST:-}
      MAX_PROXY_PORT: ${MAX_PROXY_PORT:-8888}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_PROJECT: ${S3_PROJECT}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_REPUTATION_MODEL: ${OPENAI_REPUTATION_MODEL:-gpt-4.1-mini}
      OPENAI_REPUTATION_TIMEOUT: ${OPENAI_REPUTATION_TIMEOUT:-60s}
      OPENAI_REPUTATION_MAX_OUTPUT_TOKENS: ${OPENAI_REPUTATION_MAX_OUTPUT_TOKENS:-6000}
      OPENAI_PROXY_ENABLED: ${OPENAI_PROXY_ENABLED:-false}
      OPENAI_PROXY_HOST: ${OPENAI_PROXY_HOST:-}
      OPENAI_PROXY_PORT: ${OPENAI_PROXY_PORT:-8888}
      OPENAI_PROXY_USERNAME: ${OPENAI_PROXY_USERNAME:-}
      OPENAI_PROXY_PASSWORD: ${OPENAI_PROXY_PASSWORD:-}
      OPENAI_DEEP_RESEARCH_MODEL: ${OPENAI_DEEP_RESEARCH_MODEL:-o4-mini-deep-research}
      OPENAI_DEEP_RESEARCH_TIMEOUT: ${OPENAI_DEEP_RESEARCH_TIMEOUT:-8m}
      OPENAI_DEEP_RESEARCH_MAX_TOOL_CALLS: ${OPENAI_DEEP_RESEARCH_MAX_TOOL_CALLS:-40}
      OPENAI_DEEP_RESEARCH_MAX_OUTPUT_TOKENS: ${OPENAI_DEEP_RESEARCH_MAX_OUTPUT_TOKENS:-24000}
      OPENAI_DEEP_RESEARCH_BACKGROUND: ${OPENAI_DEEP_RESEARCH_BACKGROUND:-false}
      OPENAI_RESEARCH_REPORT_MODEL: ${OPENAI_RESEARCH_REPORT_MODEL:-gpt-5.4-mini}
      OPENAI_RESEARCH_REPORT_TIMEOUT: ${OPENAI_RESEARCH_REPORT_TIMEOUT:-6m}
      OPENAI_RESEARCH_REPORT_MAX_TOOL_CALLS: ${OPENAI_RESEARCH_REPORT_MAX_TOOL_CALLS:-6}
      OPENAI_RESEARCH_REPORT_MAX_OUTPUT_TOKENS: ${OPENAI_RESEARCH_REPORT_MAX_OUTPUT_TOKENS:-6000}
      OPENAI_RESEARCH_REPORT_REASONING_EFFORT: ${OPENAI_RESEARCH_REPORT_REASONING_EFFORT:-low}
      OPENAI_RESEARCH_REPORT_SEARCH_CONTEXT_SIZE: ${OPENAI_RESEARCH_REPORT_SEARCH_CONTEXT_SIZE:-low}
      REPUTATION_AI_PROVIDER: ${REPUTATION_AI_PROVIDER:-local}
      REPUTATION_AI_MAX_WEBSITE_PAGES: ${REPUTATION_AI_MAX_WEBSITE_PAGES:-16}
      REPUTATION_AI_MAX_WEBSITE_CHARS: ${REPUTATION_AI_MAX_WEBSITE_CHARS:-20000}
      REPUTATION_AI_WEBSITE_TIMEOUT: ${REPUTATION_AI_WEBSITE_TIMEOUT:-8s}
      REPUTATION_AI_USER_AGENT: ${REPUTATION_AI_USER_AGENT:-OtzivReputationAI/1.0}
      REPUTATION_SEARCH_PROVIDER: ${REPUTATION_SEARCH_PROVIDER:-local}
      REPUTATION_SEARCH_MAX_QUERIES: ${REPUTATION_SEARCH_MAX_QUERIES:-5}
      REPUTATION_SEARCH_RESULTS_PER_QUERY: ${REPUTATION_SEARCH_RESULTS_PER_QUERY:-5}
      REPUTATION_SEARCH_CRAWL_RESULT_LIMIT: ${REPUTATION_SEARCH_CRAWL_RESULT_LIMIT:-6}
      YANDEX_AI_API_KEY: ${YANDEX_AI_API_KEY:-${YANDEX_SEARCH_API_KEY:-}}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-${YANDEX_SEARCH_FOLDER_ID:-}}
      YANDEX_GPT_BASE_URL: ${YANDEX_GPT_BASE_URL:-https://llm.api.cloud.yandex.net/foundationModels/v1/completion}
      YANDEX_GPT_MODEL: ${YANDEX_GPT_MODEL:-yandexgpt}
      YANDEX_GPT_TIMEOUT: ${YANDEX_GPT_TIMEOUT:-45s}
      YANDEX_GPT_MAX_TOKENS: ${YANDEX_GPT_MAX_TOKENS:-4000}
      YANDEX_SEARCH_API_KEY: ${YANDEX_SEARCH_API_KEY:-}
      YANDEX_SEARCH_FOLDER_ID: ${YANDEX_SEARCH_FOLDER_ID:-}
      YANDEX_SEARCH_BASE_URL: ${YANDEX_SEARCH_BASE_URL:-https://searchapi.api.cloud.yandex.net}
      YANDEX_SEARCH_TIMEOUT: ${YANDEX_SEARCH_TIMEOUT:-12s}
      YANDEX_SEARCH_TYPE: ${YANDEX_SEARCH_TYPE:-SEARCH_TYPE_RU}
      YANDEX_SEARCH_FAMILY_MODE: ${YANDEX_SEARCH_FAMILY_MODE:-FAMILY_MODE_MODERATE}
      YANDEX_SEARCH_REGION: ${YANDEX_SEARCH_REGION:-}
      JWT_SECRET: ${JWT_SECRET}
      LEAD_TRANSFER_URL: ${LEAD_TRANSFER_URL}
      LEAD_SYNCHRONY_URL: ${LEAD_SYNCHRONY_URL}
      LEAD_UPDATE_URL: ${LEAD_UPDATE_URL}
      LEAD_VPS_URL: ${LEAD_VPS_URL}
      LEAD_SYNC_OUTBOUND_ENABLED: ${LEAD_SYNC_OUTBOUND_ENABLED:-false}
      LEAD_VPS_RETRY_BATCH_SIZE: ${LEAD_VPS_RETRY_BATCH_SIZE:-100}
      LEAD_VPS_RETRY_MAX_ATTEMPTS: ${LEAD_VPS_RETRY_MAX_ATTEMPTS:-20}
      LEAD_VPS_RETRY_PERIOD_MS: ${LEAD_VPS_RETRY_PERIOD_MS:-1800000}
      APP_NAGUL_COOLDOWN: ${APP_NAGUL_COOLDOWN:-60}
      MULTIBROWSER_BASE_URL: ${MULTIBROWSER_BASE_URL:-http://multi-browser:3000}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
      BACKUP_WORK_DIR: ${BACKUP_WORK_DIR:-/app/backup}
      BACKUP_MYSQL_HOST: ${BACKUP_MYSQL_HOST:-mysql}
      BACKUP_MYSQL_PORT: ${BACKUP_MYSQL_PORT:-3306}
      BACKUP_MYSQL_DUMP_BINARY: ${BACKUP_MYSQL_DUMP_BINARY:-mysqldump}
      BACKUP_PART_SIZE_MB: ${BACKUP_PART_SIZE_MB:-35}
      BACKUP_MAIL_TO: ${BACKUP_MAIL_TO}
      BACKUP_MAIL_FROM: ${BACKUP_MAIL_FROM}
      BACKUP_MAIL_SUBJECT: ${BACKUP_MAIL_SUBJECT:-Otziv local database backup}
      BACKUP_MAIL_BODY: ${BACKUP_MAIL_BODY:-Local database backup}
    volumes:
      - ./data/app-logs:/app/logs
      - ./data/app-backup:/app/backup
      - sent_hashes:/app/sent-hashes
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15m
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - internal_net

  nginx:
    image: ${WEB_IMAGE:-otziv-web:prod-local}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./infrastructure/nginx/prod-local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/nginx/logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      app:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      grafana:
        condition: service_healthy
    networks:
      - internal_net

  dozzle:
    image: amir20/dozzle
    restart: unless-stopped
    ports:
      - "127.0.0.1:8089:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal_net

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      app:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - internal_net

  loki:
    image: grafana/loki:2.9.8
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./infrastructure/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal_net

  alloy:
    image: grafana/alloy:v1.16.0
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./infrastructure/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./data/app-logs:/var/log/otziv-app:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    healthcheck:
      test: ["CMD-SHELL", "alloy validate /etc/alloy/config.alloy >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - internal_net

  grafana:
    image: grafana/grafana:10.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${OTZIV_APP_BASE_URL}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_METRICS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - internal_net
