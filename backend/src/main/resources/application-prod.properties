spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:/app/.env[.properties]
spring.docker.compose.enabled=false

server.forward-headers-strategy=framework
server.shutdown=graceful
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.task.scheduling.pool.size=${OTZIV_TASK_SCHEDULING_POOL_SIZE:4}
spring.task.scheduling.thread-name-prefix=scheduling-

logging.file.path=${OTZIV_LOG_PATH:/app/logs}
otziv.cache.cabinet.ttl=${OTZIV_CABINET_CACHE_TTL:PT3H}
otziv.legacy.enabled=${OTZIV_LEGACY_ENABLED:false}
otziv.board.live-slice.retention-days=${OTZIV_BOARD_LIVE_SLICE_RETENTION_DAYS:90}
otziv.archive.orders.retention-days=${OTZIV_ARCHIVE_ORDERS_RETENTION_DAYS:90}
otziv.archive.orders.batch-size=${OTZIV_ARCHIVE_ORDERS_BATCH_SIZE:500}
otziv.archive.orders.max-batch-size=${OTZIV_ARCHIVE_ORDERS_MAX_BATCH_SIZE:5000}
otziv.archive.orders.apply-enabled=${OTZIV_ARCHIVE_ORDERS_APPLY_ENABLED:false}
otziv.archive.orders.schedule.enabled=${OTZIV_ARCHIVE_ORDERS_SCHEDULE_ENABLED:false}
otziv.archive.orders.schedule.cron=${OTZIV_ARCHIVE_ORDERS_SCHEDULE_CRON:0 15 4 * * *}
otziv.archive.orders.schedule.zone=${OTZIV_ARCHIVE_ORDERS_SCHEDULE_ZONE:Asia/Irkutsk}
otziv.archive.orders.schedule.catch-up-window=${OTZIV_ARCHIVE_ORDERS_SCHEDULE_CATCH_UP_WINDOW:PT3H}
otziv.analytics.rebuild.schedule.enabled=${OTZIV_ANALYTICS_REBUILD_SCHEDULE_ENABLED:false}
otziv.analytics.rebuild.schedule.cron=${OTZIV_ANALYTICS_REBUILD_SCHEDULE_CRON:0 30 3 * * *}
otziv.analytics.rebuild.schedule.zone=${OTZIV_ANALYTICS_REBUILD_SCHEDULE_ZONE:Asia/Irkutsk}
otziv.analytics.rebuild.schedule.previous-month-window-days=${OTZIV_ANALYTICS_REBUILD_SCHEDULE_PREVIOUS_MONTH_WINDOW_DAYS:7}
otziv.analytics.rebuild.schedule.verify-admin-month=${OTZIV_ANALYTICS_REBUILD_SCHEDULE_VERIFY_ADMIN_MONTH:true}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.generate_statistics=${OTZIV_HIBERNATE_STATISTICS:false}
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=${OTZIV_SLOW_SQL_MS:250}
logging.level.org.hibernate.SQL_SLOW=${OTZIV_SQL_SLOW_LOG_LEVEL:INFO}
logging.level.org.hibernate.stat=${OTZIV_HIBERNATE_STATISTICS_LOG_LEVEL:WARN}
logging.level.org.telegram.telegrambots.updatesreceivers.DefaultBotSession=${TELEGRAM_BOT_SESSION_LOG_LEVEL:WARN}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI}
spring.security.oauth2.resourceserver.jwt.audiences=${KEYCLOAK_AUDIENCE:otziv-backend}

keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL}
keycloak.admin.realm=${KEYCLOAK_ADMIN_REALM:otziv}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:otziv-backend}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}

telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}
telegram.bot.registration-enabled=${TELEGRAM_BOT_REGISTRATION_ENABLED:true}
telegram.bot.proxy.enabled=${TELEGRAM_PROXY_ENABLED:${OPENAI_PROXY_ENABLED:false}}
telegram.bot.proxy.host=${TELEGRAM_PROXY_HOST:${OPENAI_PROXY_HOST:}}
telegram.bot.proxy.port=${TELEGRAM_PROXY_PORT:${OPENAI_PROXY_PORT:8888}}
telegram.bot.proxy.type=${TELEGRAM_PROXY_TYPE:HTTP}
telegram.bot.long-polling.timeout-seconds=${TELEGRAM_LONG_POLLING_TIMEOUT_SECONDS:50}
telegram.bot.request-timeout-ms=${TELEGRAM_REQUEST_TIMEOUT_MS:30000}
telegram.admin.chat-ids=${TELEGRAM_ADMIN_CHAT_IDS:794146111,828987226}

whatsapp.proxy.enabled=${WHATSAPP_PROXY_ENABLED:${OPENAI_PROXY_ENABLED:false}}
whatsapp.proxy.host=${WHATSAPP_PROXY_HOST:${OPENAI_PROXY_HOST:}}
whatsapp.proxy.port=${WHATSAPP_PROXY_PORT:${OPENAI_PROXY_PORT:8888}}

max.bot.token=${MAX_BOT_TOKEN:}
max.bot.username=${MAX_BOT_USERNAME:}
max.bot.api-base-url=${MAX_BOT_API_BASE_URL:https://platform-api.max.ru}
max.bot.webhook-secret=${MAX_BOT_WEBHOOK_SECRET:}
max.bot.long-polling.enabled=${MAX_BOT_LONG_POLLING_ENABLED:false}
max.bot.long-polling.fixed-delay-ms=${MAX_BOT_LONG_POLLING_FIXED_DELAY_MS:30000}
max.bot.long-polling.timeout-seconds=${MAX_BOT_LONG_POLLING_TIMEOUT_SECONDS:25}
max.bot.proxy.enabled=${MAX_PROXY_ENABLED:false}
max.bot.proxy.host=${MAX_PROXY_HOST:}
max.bot.proxy.port=${MAX_PROXY_PORT:${OPENAI_PROXY_PORT:8888}}

s3.access-key=${S3_ACCESS_KEY}
s3.secret-key=${S3_SECRET_KEY}
s3.endpoint=${S3_ENDPOINT}
s3.public-base-url=${S3_PUBLIC_BASE_URL:}
s3.region=${S3_REGION}
s3.bucket=${S3_BUCKET}
s3.projectId=${S3_PROJECT}

openai.api-key=${OPENAI_API_KEY}
proxy.host=${OPENAI_PROXY_HOST:}
proxy.port=${OPENAI_PROXY_PORT:8888}

jwt.secret=${JWT_SECRET}

lead.transfer.url=${LEAD_TRANSFER_URL}
lead.synchrony.url=${LEAD_SYNCHRONY_URL}
lead.update.url=${LEAD_UPDATE_URL}
lead.sync.outbound.enabled=${LEAD_SYNC_OUTBOUND_ENABLED:false}
lead.vps.url=${LEAD_VPS_URL}
lead.vps.retry.batchSize=${LEAD_VPS_RETRY_BATCH_SIZE:100}
lead.vps.retry.maxAttempts=${LEAD_VPS_RETRY_MAX_ATTEMPTS:20}
lead.vps.retry.period.ms=${LEAD_VPS_RETRY_PERIOD_MS:1800000}

app.nagul.cooldown=${APP_NAGUL_COOLDOWN:60}
app.nagul.lookahead-days=${APP_NAGUL_LOOKAHEAD_DAYS:60}
multibrowser.base-url=${MULTIBROWSER_BASE_URL:http://multi-browser:3000}

backup.enabled=${BACKUP_ENABLED:true}
backup.work-dir=${BACKUP_WORK_DIR:/app/backup}
backup.part-size-mb=${BACKUP_PART_SIZE_MB:35}
backup.mysql.container=${BACKUP_MYSQL_CONTAINER:mysql}
backup.mysql.host=${BACKUP_MYSQL_HOST:${BACKUP_MYSQL_CONTAINER:mysql}}
backup.mysql.port=${BACKUP_MYSQL_PORT:3306}
backup.mysql.dump-binary=${BACKUP_MYSQL_DUMP_BINARY:mysqldump}
backup.mysql.db=${MYSQL_DATABASE}
backup.mysql.user=${MYSQL_USER}
backup.mysql.password=${MYSQL_PASSWORD}
backup.mail.to=${BACKUP_MAIL_TO:${MAIL_USERNAME}}
backup.mail.from=${BACKUP_MAIL_FROM:${MAIL_USERNAME}}
backup.mail.subject=${BACKUP_MAIL_SUBJECT:Otziv database backup}
backup.mail.body=${BACKUP_MAIL_BODY:Daily database backup}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

reputation-ai.provider=${REPUTATION_AI_PROVIDER:local}
reputation-ai.openai.api-key=${OPENAI_API_KEY:}
reputation-ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
reputation-ai.openai.model=${OPENAI_REPUTATION_MODEL:gpt-4.1-mini}
reputation-ai.openai.timeout=${OPENAI_REPUTATION_TIMEOUT:60s}
reputation-ai.openai.max-output-tokens=${OPENAI_REPUTATION_MAX_OUTPUT_TOKENS:6000}
reputation-ai.openai.proxy.enabled=${OPENAI_PROXY_ENABLED:false}
reputation-ai.openai.proxy.host=${OPENAI_PROXY_HOST:}
reputation-ai.openai.proxy.port=${OPENAI_PROXY_PORT:8888}
reputation-ai.openai.proxy.username=${OPENAI_PROXY_USERNAME:}
reputation-ai.openai.proxy.password=${OPENAI_PROXY_PASSWORD:}
reputation-ai.openai.deep-research.model=${OPENAI_DEEP_RESEARCH_MODEL:o4-mini-deep-research}
