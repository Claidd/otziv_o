spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
spring.docker.compose.enabled=false
spring.task.scheduling.pool.size=${OTZIV_TASK_SCHEDULING_POOL_SIZE:4}
spring.task.scheduling.thread-name-prefix=scheduling-
logging.file.path=${OTZIV_LOG_PATH:D:/Java/otziv/data/app-logs}
otziv.cache.cabinet.ttl=${OTZIV_CABINET_CACHE_TTL:PT3H}
otziv.legacy.enabled=${OTZIV_LEGACY_ENABLED:false}

spring.datasource.url=${LOCAL_DATABASE_URL:jdbc:mysql://localhost:3307/otziv?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Irkutsk}
spring.datasource.username=${LOCAL_MYSQL_USER:${MYSQL_USER:root}}
spring.datasource.password=${LOCAL_MYSQL_PASSWORD:${MYSQL_PASSWORD:}}
spring.jpa.open-in-view=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=${LOCAL_KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/otziv}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${LOCAL_KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/otziv/protocol/openid-connect/certs}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:local}
spring.mail.password=${MAIL_PASSWORD:local}

telegram.bot.token=${TELEGRAM_BOT_TOKEN:local-dev-token}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:local-dev-bot}

s3.access-key=${S3_ACCESS_KEY:local}
s3.secret-key=${S3_SECRET_KEY:local-minio-secret}
s3.endpoint=${S3_ENDPOINT:http://localhost:9001}
s3.public-base-url=${S3_PUBLIC_BASE_URL:http://localhost:9001/local}
s3.region=${S3_REGION:us-east-1}
s3.bucket=${S3_BUCKET:local}
s3.projectId=${S3_PROJECT:local}

openai.api-key=${OPENAI_API_KEY:local-dev-key}
jwt.secret=${JWT_SECRET:local-dev-secret-local-dev-secret-local-dev-secret-local-dev-secret}

keycloak.admin.server-url=${LOCAL_KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8180}
keycloak.admin.realm=${LOCAL_KEYCLOAK_ADMIN_REALM:otziv}
keycloak.admin.client-id=${LOCAL_KEYCLOAK_ADMIN_CLIENT_ID:otziv-backend}
keycloak.admin.client-secret=${LOCAL_KEYCLOAK_ADMIN_CLIENT_SECRET:change-me-local-secret}

lead.transfer.url=${LEAD_TRANSFER_URL:http://localhost/api/leads/import}
lead.synchrony.url=${LEAD_SYNCHRONY_URL:http://localhost/api/leads/modified}
lead.update.url=${LEAD_UPDATE_URL:http://localhost/api/leads/update}
lead.vps.url=${LEAD_VPS_URL:http://localhost/api/leads/sync}

spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=${OTZIV_SLOW_SQL_MS:50}
logging.level.org.hibernate.SQL_SLOW=INFO

spring.jpa.properties.hibernate.generate_statistics=${OTZIV_HIBERNATE_STATISTICS:false}
logging.level.org.hibernate.stat=${OTZIV_HIBERNATE_STATISTICS_LOG_LEVEL:INFO}

otziv.board.live-slice.retention-days=${OTZIV_BOARD_LIVE_SLICE_RETENTION_DAYS:90}
otziv.archive.orders.retention-days=${OTZIV_ARCHIVE_ORDERS_RETENTION_DAYS:90}
otziv.archive.orders.batch-size=${OTZIV_ARCHIVE_ORDERS_BATCH_SIZE:500}
otziv.archive.orders.max-batch-size=${OTZIV_ARCHIVE_ORDERS_MAX_BATCH_SIZE:5000}
otziv.archive.orders.apply-enabled=${OTZIV_ARCHIVE_ORDERS_APPLY_ENABLED:false}
otziv.archive.orders.schedule.enabled=${OTZIV_ARCHIVE_ORDERS_SCHEDULE_ENABLED:false}
otziv.archive.orders.schedule.cron=${OTZIV_ARCHIVE_ORDERS_SCHEDULE_CRON:0 15 4 * * *}
otziv.archive.orders.schedule.zone=${OTZIV_ARCHIVE_ORDERS_SCHEDULE_ZONE:Asia/Irkutsk}
otziv.archive.orders.schedule.catch-up-window=${OTZIV_ARCHIVE_ORDERS_SCHEDULE_CATCH_UP_WINDOW:PT3H}
otziv.analytics.rebuild.schedule.enabled=${OTZIV_ANALYTICS_REBUILD_SCHEDULE_ENABLED:false}
otziv.analytics.rebuild.schedule.cron=${OTZIV_ANALYTICS_REBUILD_SCHEDULE_CRON:0 30 3 * * *}
otziv.analytics.rebuild.schedule.zone=${OTZIV_ANALYTICS_REBUILD_SCHEDULE_ZONE:Asia/Irkutsk}
otziv.analytics.rebuild.schedule.previous-month-window-days=${OTZIV_ANALYTICS_REBUILD_SCHEDULE_PREVIOUS_MONTH_WINDOW_DAYS:7}
otziv.analytics.rebuild.schedule.verify-admin-month=${OTZIV_ANALYTICS_REBUILD_SCHEDULE_VERIFY_ADMIN_MONTH:true}

backup.enabled=${BACKUP_ENABLED:false}
backup.work-dir=${BACKUP_WORK_DIR:../data/app-backup}
backup.part-size-mb=${BACKUP_PART_SIZE_MB:35}
backup.mysql.host=${BACKUP_MYSQL_HOST:localhost}
backup.mysql.port=${BACKUP_MYSQL_PORT:3307}
backup.mysql.dump-binary=${BACKUP_MYSQL_DUMP_BINARY:mysqldump}
backup.mysql.db=${MYSQL_DATABASE:otziv}
backup.mysql.user=${LOCAL_MYSQL_USER:${MYSQL_USER:root}}
backup.mysql.password=${LOCAL_MYSQL_PASSWORD:${MYSQL_PASSWORD:}}

reputation-ai.provider=${REPUTATION_AI_PROVIDER:local}
reputation-ai.openai.api-key=${OPENAI_API_KEY:}
reputation-ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
reputation-ai.openai.model=${OPENAI_REPUTATION_MODEL:gpt-4.1-mini}
reputation-ai.openai.timeout=${OPENAI_REPUTATION_TIMEOUT:60s}
reputation-ai.openai.max-output-tokens=${OPENAI_REPUTATION_MAX_OUTPUT_TOKENS:6000}
reputation-ai.openai.proxy.enabled=${OPENAI_PROXY_ENABLED:false}
reputation-ai.openai.proxy.host=${OPENAI_PROXY_HOST:}
reputation-ai.openai.proxy.port=${OPENAI_PROXY_PORT:8888}
reputation-ai.openai.proxy.username=${OPENAI_PROXY_USERNAME:}
reputation-ai.openai.proxy.password=${OPENAI_PROXY_PASSWORD:}
reputation-ai.openai.deep-research.model=${OPENAI_DEEP_RESEARCH_MODEL:o4-mini-deep-research}
reputation-ai.openai.deep-research.timeout=${OPENAI_DEEP_RESEARCH_TIMEOUT:8m}
reputation-ai.openai.deep-research.max-tool-calls=${OPENAI_DEEP_RESEARCH_MAX_TOOL_CALLS:40}
reputation-ai.openai.deep-research.max-output-tokens=${OPENAI_DEEP_RESEARCH_MAX_OUTPUT_TOKENS:24000}
reputation-ai.openai.deep-research.background=${OPENAI_DEEP_RESEARCH_BACKGROUND:false}
reputation-ai.openai.research-report.model=${OPENAI_RESEARCH_REPORT_MODEL:gpt-5.5}
reputation-ai.openai.research-report.timeout=${OPENAI_RESEARCH_REPORT_TIMEOUT:6m}
reputation-ai.openai.research-report.max-tool-calls=${OPENAI_RESEARCH_REPORT_MAX_TOOL_CALLS:24}
reputation-ai.openai.research-report.max-output-tokens=${OPENAI_RESEARCH_REPORT_MAX_OUTPUT_TOKENS:12000}
reputation-ai.openai.research-report.reasoning-effort=${OPENAI_RESEARCH_REPORT_REASONING_EFFORT:low}
reputation-ai.openai.research-report.search-context-size=${OPENAI_RESEARCH_REPORT_SEARCH_CONTEXT_SIZE:medium}
reputation-ai.yandex.api-key=${YANDEX_AI_API_KEY:${YANDEX_SEARCH_API_KEY:}}
reputation-ai.yandex.folder-id=${YANDEX_FOLDER_ID:${YANDEX_SEARCH_FOLDER_ID:}}
reputation-ai.yandex.base-url=${YANDEX_GPT_BASE_URL:https://llm.api.cloud.yandex.net/foundationModels/v1/completion}
reputation-ai.yandex.model=${YANDEX_GPT_MODEL:yandexgpt}
reputation-ai.yandex.timeout=${YANDEX_GPT_TIMEOUT:45s}
reputation-ai.yandex.max-tokens=${YANDEX_GPT_MAX_TOKENS:4000}
reputation-ai.max-website-pages=${REPUTATION_AI_MAX_WEBSITE_PAGES:16}
reputation-ai.max-website-chars=${REPUTATION_AI_MAX_WEBSITE_CHARS:20000}
reputation-ai.website-timeout=${REPUTATION_AI_WEBSITE_TIMEOUT:8s}
reputation-ai.user-agent=${REPUTATION_AI_USER_AGENT:OtzivReputationAI/1.0}
reputation-ai.search.provider=${REPUTATION_SEARCH_PROVIDER:local}
reputation-ai.search.max-queries=${REPUTATION_SEARCH_MAX_QUERIES:5}
reputation-ai.search.results-per-query=${REPUTATION_SEARCH_RESULTS_PER_QUERY:5}
reputation-ai.search.crawl-result-limit=${REPUTATION_SEARCH_CRAWL_RESULT_LIMIT:6}
reputation-ai.search.yandex.api-key=${YANDEX_SEARCH_API_KEY:${YANDEX_AI_API_KEY:}}
reputation-ai.search.yandex.folder-id=${YANDEX_SEARCH_FOLDER_ID:${YANDEX_FOLDER_ID:}}
reputation-ai.search.yandex.base-url=${YANDEX_SEARCH_BASE_URL:https://searchapi.api.cloud.yandex.net}
reputation-ai.search.yandex.timeout=${YANDEX_SEARCH_TIMEOUT:12s}
reputation-ai.search.yandex.search-type=${YANDEX_SEARCH_TYPE:SEARCH_TYPE_RU}
reputation-ai.search.yandex.family-mode=${YANDEX_SEARCH_FAMILY_MODE:FAMILY_MODE_MODERATE}
reputation-ai.search.yandex.region=${YANDEX_SEARCH_REGION:}
