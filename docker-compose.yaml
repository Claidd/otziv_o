name: otziv-prod

networks:
  internal_net:
    driver: bridge

volumes:
  mysql_data:
    external: true
    name: docker_mysql_data
  keycloak_pg_data:
  loki_data:
  tempo_data:
  alloy_data:
  grafana_data:
  prometheus_data:
  sent_hashes:

services:
  mysql:
    image: mysql:latest
    container_name: my-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --restrict-fk-on-non-standard-key=OFF
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Irkutsk}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/mysql_backup:/backup
      - ./data/bots:/var/lib/mysql-files
    healthcheck:
      test: ["CMD-SHELL", "mysql --protocol=TCP -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} $${MYSQL_DATABASE} -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - internal_net

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PHPMYADMIN_PORT:-6571}:80"
    environment:
      UPLOAD_LIMIT: 512M
      PMA_HOST: mysql
      PMA_ARBITRARY: "0"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal_net
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  keycloak-postgres:
    image: postgres:17
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      TZ: ${TZ:-Asia/Irkutsk}
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - internal_net

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    mem_limit: 2g
    command: start --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /keycloak
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_ADMIN: ${KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HOSTNAME_STRICT: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_PROXY_TRUSTED_ADDRESSES: ${KC_PROXY_TRUSTED_ADDRESSES:-172.16.0.0/12,10.0.0.0/8,192.168.0.0/16,127.0.0.0/8}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      OTZIV_APP_BASE_URL: ${OTZIV_APP_BASE_URL}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
    volumes:
      - ./infrastructure/keycloak/realm-config.prod.json:/opt/keycloak/data/import/otziv-realm.json:ro
      - ./infrastructure/keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -ec 'exec 3<>/dev/tcp/127.0.0.1/9000;
          printf "GET /keycloak/health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3;
          cat <&3 | grep -q UP'
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - internal_net

  app:
    image: ${APP_IMAGE:-claid38/otziv-app:latest}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      OTZIV_APP_BASE_URL: ${OTZIV_APP_BASE_URL:-https://o-ogo.ru}
      TZ: ${TZ:-Asia/Irkutsk}
      JAVA_OPTS: "${JAVA_OPTS:--Xms256m -Xmx768m -XX:MaxRAMPercentage=75} -Djdk.http.auth.tunneling.disabledSchemes= -Djdk.http.auth.proxying.disabledSchemes="
      APP_HTTP_CLIENT_CONNECT_TIMEOUT: ${APP_HTTP_CLIENT_CONNECT_TIMEOUT:-5s}
      APP_HTTP_CLIENT_READ_TIMEOUT: ${APP_HTTP_CLIENT_READ_TIMEOUT:-150s}
      OTZIV_SERVICE_NAME: ${OTZIV_SERVICE_NAME:-otziv-backend}
      OTZIV_TRACING_ENABLED: ${OTZIV_TRACING_ENABLED:-false}
      MANAGEMENT_TRACING_ENABLED: ${OTZIV_TRACING_ENABLED:-false}
      MANAGEMENT_TRACING_EXPORT_ENABLED: ${OTZIV_TRACING_ENABLED:-false}
      MANAGEMENT_TRACING_EXPORT_OTLP_ENABLED: ${OTZIV_TRACING_ENABLED:-false}
      OTZIV_TRACING_SAMPLING_PROBABILITY: ${OTZIV_TRACING_SAMPLING_PROBABILITY:-0.1}
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: ${OTZIV_OTLP_TRACES_ENDPOINT:-http://tempo:4318/v1/traces}
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      DATABASE_URL: ${DATABASE_URL}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-otziv-backend}
      KEYCLOAK_ADMIN_SERVER_URL: ${KEYCLOAK_ADMIN_SERVER_URL}
      KEYCLOAK_ADMIN_REALM: ${KEYCLOAK_ADMIN_REALM:-otziv}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-otziv-backend}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
