      LEAD_VPS_RETRY_PERIOD_MS: ${LEAD_VPS_RETRY_PERIOD_MS:-1800000}
      APP_NAGUL_COOLDOWN: ${APP_NAGUL_COOLDOWN:-60}
      MULTIBROWSER_BASE_URL: ${MULTIBROWSER_BASE_URL:-http://multi-browser:3000}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_WORK_DIR: ${BACKUP_WORK_DIR:-/app/backup}
      BACKUP_MYSQL_HOST: ${BACKUP_MYSQL_HOST:-mysql}
      BACKUP_MYSQL_PORT: ${BACKUP_MYSQL_PORT:-3306}
      BACKUP_MYSQL_DUMP_BINARY: ${BACKUP_MYSQL_DUMP_BINARY:-mysqldump}
      BACKUP_PART_SIZE_MB: ${BACKUP_PART_SIZE_MB:-35}
      BACKUP_MAIL_TO: ${BACKUP_MAIL_TO}
      BACKUP_MAIL_FROM: ${BACKUP_MAIL_FROM}
      BACKUP_MAIL_SUBJECT: ${BACKUP_MAIL_SUBJECT:-Otziv database backup}
      BACKUP_MAIL_BODY: ${BACKUP_MAIL_BODY:-Daily database backup}
    volumes:
      - ./data/app-logs:/app/logs
      - ./data/app-backup:/app/backup
      - sent_hashes:/app/sent-hashes
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15m
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - internal_net

  whatsapp_lika:
    image: ${WHATSAPP_IMAGE:-otziv-whatsapp:latest}
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    container_name: whatsapp_lika
    restart: unless-stopped
    environment:
      CLIENT_ID: ${WHATSAPP_LIKA_CLIENT_ID:-whatsapp_lika}
      SERVER_URL: ${WHATSAPP_BACKEND_URL:-http://app:8080}
      AUTH_PATH: /auth
      WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:-}
      WHATSAPP_PROXY_ENABLED: ${WHATSAPP_PROXY_ENABLED:-false}
      WHATSAPP_PROXY_HOST: ${WHATSAPP_PROXY_HOST:-}
      WHATSAPP_PROXY_PORT: ${WHATSAPP_PROXY_PORT:-8888}
      WHATSAPP_PROXY_TYPE: ${WHATSAPP_PROXY_TYPE:-http}
      WHATSAPP_GROUPS_TIMEOUT_MS: ${WHATSAPP_GROUPS_TIMEOUT_MS:-10000}
      WHATSAPP_GROUPS_RESPONSE_TIMEOUT_MS: ${WHATSAPP_GROUPS_RESPONSE_TIMEOUT_MS:-25000}
      WHATSAPP_GROUPS_CACHE_TTL_MS: ${WHATSAPP_GROUPS_CACHE_TTL_MS:-600000}
      WHATSAPP_GROUP_INVITE_TIMEOUT_MS: ${WHATSAPP_GROUP_INVITE_TIMEOUT_MS:-2000}
      WHATSAPP_GROUP_INVITE_CONCURRENCY: ${WHATSAPP_GROUP_INVITE_CONCURRENCY:-16}
      WHATSAPP_PUPPETEER_TIMEOUT_MS: ${WHATSAPP_PUPPETEER_TIMEOUT_MS:-300000}
      WHATSAPP_READY_AFTER_AUTH_TIMEOUT_MS: ${WHATSAPP_READY_AFTER_AUTH_TIMEOUT_MS:-300000}
      WHATSAPP_STARTUP_READY_TIMEOUT_MS: ${WHATSAPP_STARTUP_READY_TIMEOUT_MS:-600000}
    volumes:
      - ./data/whatsapp_auth/whatsapp_lika:/auth
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10m
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal_net

  whatsapp_vika:
    image: ${WHATSAPP_IMAGE:-otziv-whatsapp:latest}
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    container_name: whatsapp_vika
    restart: unless-stopped
    environment:
      CLIENT_ID: ${WHATSAPP_VIKA_CLIENT_ID:-whatsapp_vika}
      SERVER_URL: ${WHATSAPP_BACKEND_URL:-http://app:8080}
      AUTH_PATH: /auth
      WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:-}
      WHATSAPP_PROXY_ENABLED: ${WHATSAPP_PROXY_ENABLED:-false}
      WHATSAPP_PROXY_HOST: ${WHATSAPP_PROXY_HOST:-}
      WHATSAPP_PROXY_PORT: ${WHATSAPP_PROXY_PORT:-8888}
      WHATSAPP_PROXY_TYPE: ${WHATSAPP_PROXY_TYPE:-http}
      WHATSAPP_GROUPS_TIMEOUT_MS: ${WHATSAPP_GROUPS_TIMEOUT_MS:-10000}
      WHATSAPP_GROUPS_RESPONSE_TIMEOUT_MS: ${WHATSAPP_GROUPS_RESPONSE_TIMEOUT_MS:-25000}
      WHATSAPP_GROUPS_CACHE_TTL_MS: ${WHATSAPP_GROUPS_CACHE_TTL_MS:-600000}
      WHATSAPP_GROUP_INVITE_TIMEOUT_MS: ${WHATSAPP_GROUP_INVITE_TIMEOUT_MS:-2000}
      WHATSAPP_GROUP_INVITE_CONCURRENCY: ${WHATSAPP_GROUP_INVITE_CONCURRENCY:-16}
      WHATSAPP_PUPPETEER_TIMEOUT_MS: ${WHATSAPP_PUPPETEER_TIMEOUT_MS:-300000}
      WHATSAPP_READY_AFTER_AUTH_TIMEOUT_MS: ${WHATSAPP_READY_AFTER_AUTH_TIMEOUT_MS:-300000}
      WHATSAPP_STARTUP_READY_TIMEOUT_MS: ${WHATSAPP_STARTUP_READY_TIMEOUT_MS:-600000}
    volumes:
      - ./data/whatsapp_auth/whatsapp_vika:/auth
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10m
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal_net

  nginx:
    image: ${WEB_IMAGE:-claid38/otziv-web:latest}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/nginx/certs:/etc/nginx/certs:ro
      - ./data/nginx/www:/var/www/certbot
      - ./data/nginx/logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      app:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      grafana:
        condition: service_healthy
    networks:
      - internal_net

  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/nginx/certs:/etc/nginx/certs
      - ./data/nginx/www:/var/www/certbot
    networks:
      - internal_net

  dozzle:
    image: amir20/dozzle
    container_name: log-viewer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_LEVEL: info
    networks:
      - internal_net
    healthcheck:
      test: [ "CMD", "/dozzle", "healthcheck" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      app:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - internal_net

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./infrastructure/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal_net

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infrastructure/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3200/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal_net

  alloy:
    image: grafana/alloy:v1.16.0
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./infrastructure/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./data/app-logs:/var/log/otziv-app:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    healthcheck:
      test: ["CMD-SHELL", "alloy validate /etc/alloy/config.alloy >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - internal_net

  grafana:
    image: grafana/grafana:10.3.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_LOCAL_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${OTZIV_APP_BASE_URL}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_METRICS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "strict"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 3m
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    networks:
      - internal_net
