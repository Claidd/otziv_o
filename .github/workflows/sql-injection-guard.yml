name: SQL injection guard

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sql-injection-guard:
    name: SQL injection guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan backend query construction
        shell: pwsh
        run: ./infrastructure/scripts/security/sql-injection-guard.ps1 -Mode dir
