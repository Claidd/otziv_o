name: Secret scan

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block tracked env files
        shell: bash
        run: |
          set -euo pipefail
          blocked="$(git ls-files | grep -E '(^|/)\.env($|\.)' | grep -vE '\.example$' || true)"
          if [ -n "$blocked" ]; then
            echo "Real env files must not be tracked. Commit only .env*.example files."
            echo "$blocked"
            exit 1
          fi

      - name: Gitleaks working tree scan
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            dir --config /repo/.gitleaks.toml --redact --no-banner .
